# Uses an in-memory H2 database - no installation needed, resets on every restart.
# This is perfect for a demo/interview: it "just runs" with no external DB setup.
spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Lets you view the database tables in a browser at /h2-console (great for demos)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Recreates tables from the @Entity classes every time the app starts
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# ---------------------------------------------------------------------------
# TO SWITCH TO REAL MYSQL INSTEAD OF H2 (matches what's on the resume):
# 1. Uncomment the mysql-connector-j dependency in pom.xml (and remove/comment h2)
# 2. Replace the datasource lines above with:
#
# spring.datasource.url=jdbc:mysql://localhost:3306/ecommercedb?createDatabaseIfNotExist=true
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.hibernate.ddl-auto=update
# ---------------------------------------------------------------------------
